<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind & Media Hero Concept</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; background-color: #020204; overflow: hidden; font-family: 'Sora', sans-serif; cursor: none; }

    /* Ambient Light Leaks */
    #ambient-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; background-color: #020204; }
    .light-leak { position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.5; pointer-events: none; }
    .leak-1 { width: 80vw; height: 80vw; top: -30vh; left: -20vw; background: radial-gradient(circle, rgba(20, 10, 48, 0.9) 0%, transparent 70%); animation: drift1 40s infinite linear; }
    .leak-2 { width: 70vw; height: 70vw; bottom: -30vh; right: -20vw; background: radial-gradient(circle, rgba(14, 8, 38, 0.8) 0%, transparent 70%); animation: drift2 45s infinite linear; }
    .leak-center { width: 60vw; height: 60vw; top: 20vh; left: 20vw; background: radial-gradient(circle, rgba(16, 12, 32, 0.8) 0%, transparent 70%); }
    
    @keyframes drift1 { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(15%, 15%) rotate(180deg); } 100% { transform: translate(0, 0) rotate(360deg); } }
    @keyframes drift2 { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-15%, -15%) rotate(-180deg); } 100% { transform: translate(0, 0) rotate(-360deg); } }

    #bg-canvas, #noise-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    #noise-canvas { width: 150vw; height: 150vh; opacity: 0.025; z-index: 1; mix-blend-mode: overlay; will-change: transform; }

    #vignette {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(2,2,4,0.85) 100%);
    }

    #text-layer {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; pointer-events: none;
    }

    #title-container { position: relative; }

    #title {
      font-family: 'Bebas Neue', cursive; font-size: 7vw; color: #F5F5F5;
      margin: 0; line-height: 1; white-space: nowrap; text-transform: uppercase;
      position: relative;
    }

    #title span {
      display: inline-block; opacity: 0; filter: blur(4px); letter-spacing: 18px;
      transition: opacity 2.8s cubic-bezier(0.12, 0, 0.39, 0), filter 2.8s cubic-bezier(0.12, 0, 0.39, 0), letter-spacing 2.8s cubic-bezier(0.12, 0, 0.39, 0);
    }
    
    .title-arrive { opacity: 1 !important; filter: blur(0px) !important; letter-spacing: 2px !important; }

    .glitch-slice {
      position: absolute; top: 0; left: 0; font-family: 'Bebas Neue', cursive; font-size: 7vw; color: #F5F5F5;
      line-height: 1; white-space: nowrap; text-transform: uppercase; letter-spacing: 2px;
    }

    #underline {
      height: 1px; width: 0%; background: rgba(192, 132, 252, 0.4); margin-top: 5px;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #subtitle {
      font-family: 'Sora', sans-serif; font-weight: 300; font-size: 1.4vw; color: #C084FC;
      margin-top: 1.5vh; opacity: 0; text-align: center; max-width: 80%; white-space: nowrap;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    #cursor { display: inline-block; animation: blink 500ms infinite; }

    .distortion-bar { position: absolute; left: 0; width: 100vw; background: rgba(255, 255, 255, 0.12); pointer-events: none; }

    #flash {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #ffffff;
      z-index: 999; pointer-events: none; opacity: 0;
    }

    #hint-text {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      font-family: 'Sora', sans-serif; font-size: 11px; color: rgba(255,255,255,0.25);
      letter-spacing: 3px; opacity: 0; transition: opacity 2s ease; z-index: 20; pointer-events: none;
    }

    /* Custom Cursor */
    #custom-cursor {
      position: fixed; width: 12px; height: 12px; border: 1px solid rgba(192,132,252,0.6);
      border-radius: 50%; pointer-events: none; z-index: 9999; opacity: 0; transition: opacity 0.5s;
      transform: translate(-50%, -50%);
    }

  </style>
</head>
<body>
  <div id="ambient-container">
    <div class="light-leak leak-1"></div>
    <div class="light-leak leak-2"></div>
    <div class="light-leak leak-center"></div>
  </div>
  <canvas id="bg-canvas"></canvas>
  <canvas id="noise-canvas"></canvas>
  <div id="distortion-container"></div>
  <div id="vignette"></div>
  
  <div id="text-layer">
    <div id="title-container">
      <h1 id="title"></h1>
      <div id="underline"></div>
    </div>
    <h2 id="subtitle"></h2>
  </div>

  <div id="flash"></div>
  <div id="hint-text">PRESS SPACE OR → TO CONTINUE</div>
  <div id="custom-cursor"></div>

  <script>
    // ==========================================
    // AUDIO CONTEXT
    // ==========================================
    let audioCtx = null;
    let userInteracted = false;
    window.addEventListener('click', () => { userInteracted = true; });
    window.addEventListener('keydown', () => { userInteracted = true; });

    function playSubBass() {
      if (!userInteracted) return;
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(40, audioCtx.currentTime); 
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      } catch (e) {
        // Mute playback errors
      }
    }

    // ==========================================
    // CONFIGURATION & CONSTANTS
    // ==========================================
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d'); // Using transparent canvas for ambient bg
    const noiseCanvas = document.getElementById('noise-canvas');
    const nctx = noiseCanvas.getContext('2d');
    const flashDiv = document.getElementById('flash');
    const titleEl = document.getElementById('title');
    const titleContainer = document.getElementById('title-container');
    const underlineEl = document.getElementById('underline');
    const subtitleEl = document.getElementById('subtitle');
    const hintTextContainer = document.getElementById('hint-text');
    const customCursor = document.getElementById('custom-cursor');
    const distortionContainer = document.getElementById('distortion-container');

    let width = window.innerWidth;
    let height = window.innerHeight;
    const initialDpr = window.devicePixelRatio || 1;
    
    // Node Sprite Canvas (Offscreen rendering for performance)
    const spriteCanvas = document.createElement('canvas');
    spriteCanvas.width = 60 * initialDpr;
    spriteCanvas.height = 60 * initialDpr;
    const sctx = spriteCanvas.getContext('2d');
    sctx.scale(initialDpr, initialDpr);
    sctx.shadowBlur = 12;
    sctx.shadowColor = '#F472B6';
    sctx.fillStyle = '#F472B6';
    sctx.beginPath();
    sctx.arc(30, 30, 3, 0, Math.PI * 2);
    sctx.fill();

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      ctx.scale(dpr, dpr);

      // Render oversized noise for jittering
      const nw = width * 1.5; const nh = height * 1.5;
      noiseCanvas.width = nw;
      noiseCanvas.height = nh;
      const idata = nctx.createImageData(nw, nh);
      for(let i=0; i<idata.data.length; i+=4) {
        const val = Math.random() * 255;
        idata.data[i] = val;
        idata.data[i+1] = val;
        idata.data[i+2] = val;
        idata.data[i+3] = 255;
      }
      nctx.putImageData(idata, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize(); // Initial run

    // Cursor tracking
    window.addEventListener('mousemove', (e) => {
      customCursor.style.left = e.clientX + 'px';
      customCursor.style.top = e.clientY + 'px';
    });

    const COLORS = { line: 'rgba(192, 132, 252, 0.25)', halo: 'rgba(244,114,182,0.15)' };

    // ==========================================
    // STATE FLAGS
    // ==========================================
    const state = {
      stage1PulseFired: false,
      stage1Done: false,
      stage3Done: false,
      stage4Done: false,
      stage5Start: false,
      stage5aStart: false,
      stage5bSnap: false,
      stage6Done: false,
      stage7Start: false,
      stage7Done: false,
      stage8Start: false,
      redirecting: false
    };

    let startTime = null;
    let globalNetworkOpacity = 1.0;
    
    // ==========================================
    // CLASS STRUCTURE
    // ==========================================
    class Node {
      constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = x;
        this.y = y;
        this.depth = 0.6 + Math.random() * 0.4;
        this.restRadius = 3 * this.depth;
        this.radius = this.restRadius; 
        this.haloRadius = 9 * this.depth; 
        this.opacity = 1;
        this.edges = [];
        this.pulseState = 0; 
        this.pulseMaxRadius = 12 * this.depth;
        this.pulseSpeed = 0;
        this.spawned = true; 
        this.nodeAngle = Math.random() * Math.PI * 2;
      }

      triggerPulse(maxR, speedMultiplier) {
        this.pulseState = 1;
        this.pulseMaxRadius = maxR * this.depth;
        this.pulseSpeed = speedMultiplier;
      }

      update(dt, elapsed) {
        // Breathing
        const breathOffset = Math.sin(elapsed * 0.3) * 8;
        this.x = this.baseX + Math.cos(this.nodeAngle) * breathOffset;
        this.y = this.baseY + Math.sin(this.nodeAngle) * breathOffset;

        if (this.pulseState === 1) {
          this.radius += 100 * dt * this.pulseSpeed; 
          if (this.radius >= this.pulseMaxRadius) {
            this.radius = this.pulseMaxRadius;
            this.pulseState = 2;
          }
        } else if (this.pulseState === 2) {
          this.radius -= 60 * dt * this.pulseSpeed;
          if (this.radius <= this.restRadius) {
            this.radius = this.restRadius;
            this.pulseState = 0;
          }
        } else {
          this.radius = this.restRadius;
        }
        this.haloRadius = this.radius * 3;
      }

      draw(ctx, networkOpacity) {
        ctx.save();
        ctx.globalAlpha = this.opacity * networkOpacity;

        // Halo
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0.1, this.haloRadius), 0, Math.PI * 2);
        ctx.fillStyle = COLORS.halo;
        ctx.fill();

        // Screen Core Draw using Sprite
        ctx.globalCompositeOperation = 'screen';
        const sprSize = 60 * (this.radius / 3); // Scale sprite based on visual pulse
        ctx.drawImage(spriteCanvas, this.x - sprSize/2, this.y - sprSize/2, sprSize, sprSize);
        
        ctx.restore();
      }
    }

    class Edge {
      constructor(fromNode, toNode) {
        this.from = fromNode;
        this.to = toNode;
        this.progress = 0; 
        this.drawSpeed = 0.008 + Math.random() * 0.014;
        this.thickness = 0.4 + Math.random() * 0.4;
        this.opacity = Math.min(fromNode.depth, toNode.depth);
        this.isComplete = false;

        // Quadratic Curve point offset
        const midX = (fromNode.baseX + toNode.baseX) / 2;
        const midY = (fromNode.baseY + toNode.baseY) / 2;
        const angle = Math.atan2(toNode.baseY - fromNode.baseY, toNode.baseX - fromNode.baseX);
        const offsetDist = (Math.random() > 0.5 ? 1 : -1) * (20 + Math.random() * 25);
        this.cpX = midX + Math.cos(angle + Math.PI/2) * offsetDist;
        this.cpY = midY + Math.sin(angle + Math.PI/2) * offsetDist;
      }

      update(dt) {
        if (this.progress < 1) {
          const easedIncrement = this.drawSpeed * Math.sin(this.progress * Math.PI) * (dt * 60);
          const minimum = this.drawSpeed * 0.3 * dt * 60;
          this.progress += easedIncrement + minimum;
          if (this.progress >= 1) {
            this.progress = 1;
            this.isComplete = true;
          }
        }
      }

      getPointOnBezier(t) {
        const u = 1 - t;
        const tt = t * t;
        const uu = u * u;
        const cx = uu * this.from.x + 2 * u * t * this.cpX + tt * this.to.x;
        const cy = uu * this.from.y + 2 * u * t * this.cpY + tt * this.to.y;
        return {x: cx, y: cy};
      }

      draw(ctx, networkOpacity) {
        if (this.progress <= 0) return;
        
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(this.from.x, this.from.y);
        
        // Compute path up to progress t
        const steps = Math.floor(this.progress * 20); // resolution
        for (let i = 1; i <= steps; i++) {
            const p = this.getPointOnBezier(i / 20.0);
            ctx.lineTo(p.x, p.y);
        }
        // Final exact point
        const fp = this.getPointOnBezier(this.progress);
        ctx.lineTo(fp.x, fp.y);

        ctx.strokeStyle = COLORS.line;
        ctx.lineWidth = this.thickness;
        ctx.shadowBlur = 3;
        ctx.shadowColor = '#C084FC';
        ctx.globalAlpha = this.opacity * networkOpacity;
        ctx.stroke();
        ctx.restore();
      }
    }

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = height + Math.random() * 100;
        this.speed = 8 + Math.random() * 15; // px per sec
        this.baseOpacity = 0.1 + Math.random() * 0.25;
        this.opacity = this.baseOpacity;
        this.size = 0.5 + Math.random() * 2.5; // Up to 3px radius for bokeh depth
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.5 + Math.random() * 1.5;
      }
      update(dt, elapsed) {
        this.y -= this.speed * dt;
        this.wobble += this.wobbleSpeed * dt;
        this.x += Math.cos(this.wobble) * 0.3;
        
        // Slow pulsing optical depth
        this.opacity = this.baseOpacity * (0.6 + 0.4 * Math.sin(elapsed * 0.5 + this.wobble));
        
        if (this.y < -10) { this.y = height + 10; this.x = Math.random() * width; }
      }
      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        
        // Bokeh Radial Gradient
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
        grad.addColorStop(0, 'rgba(192, 132, 252, 1)');
        grad.addColorStop(0.4, 'rgba(192, 132, 252, 0.8)');
        grad.addColorStop(1, 'rgba(192, 132, 252, 0)');
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();
      }
    }

    // ==========================================
    // DATA STORES
    // ==========================================
    const nodes = [];
    const edges = [];
    const particles = Array.from({length: 20}, () => new Particle());
    const targetNodes = 110;

    // Text
    const originalTitle = "Mind & Media";
    const titleChars = originalTitle.split('');
    const originalSubtitle = "How platforms rewire your brain — and what you can do about it.";
    const titleSpans = [];

    // Glitch vars
    let lastGlitchCharTime = 0;
    let lastGlitchShiftTime = 0;
    let lastDistortionTime = 0;
    let lockTimer = null;
    let chromaticOffset = 0;
    const lockedChars = new Set();
    const COLORS_GLITCH = ['#FFFFFF', '#C084FC', '#F472B6', '#FF2222'];
    const glitchBank = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$*%&!?[]<>\\/|~".split('');
    
    // Subtitle vars
    let subtitleIndex = 0;
    let lastTypewriterTime = 0;
    let cursorObj = null;

    let lastIdlePulseTime = 0;
    let nextIdlePulseDelay = 2.0;

    // ==========================================
    // INITIALIZATION
    // ==========================================
    function setupText() {
      titleEl.innerHTML = '';
      titleChars.forEach((char) => {
        const span = document.createElement('span');
        if (char === ' ') span.innerHTML = '&nbsp;'; else span.textContent = char;
        titleSpans.push(span);
        titleEl.appendChild(span);
      });
      subtitleEl.textContent = "";
    }

    function initNetwork() {
      let edgeX, edgeY;
      const edgeSide = Math.floor(Math.random() * 4);
      if (edgeSide === 0) { edgeX = Math.random() * width; edgeY = -10; } 
      else if (edgeSide === 1) { edgeX = width + 10; edgeY = Math.random() * height; } 
      else if (edgeSide === 2) { edgeX = Math.random() * width; edgeY = height + 10; } 
      else { edgeX = -10; edgeY = Math.random() * height; } 

      const startNode = new Node(edgeX, edgeY);
      nodes.push(startNode);
    }

    function spawnEdges() {
      if (nodes.length >= targetNodes) return;
      const spawnCount = Math.floor(Math.random() * 2) + 3;
      
      for (let i = 0; i < spawnCount && nodes.length < targetNodes; i++) {
        if (nodes.length === 0) continue;
        const parent = nodes[Math.floor(Math.random() * nodes.length)];
        
        const baseAngle = Math.atan2((height/2) - parent.baseY, (width/2) - parent.baseX);
        const finalAngle = baseAngle + (Math.random() * 180 - 90) * (Math.PI / 180);
        
        const distance = 100 + Math.random() * 120; 
        const newX = parent.baseX + Math.cos(finalAngle) * distance;
        const newY = parent.baseY + Math.sin(finalAngle) * distance;
        
        if (newX < 0 || newX > width || newY < 0 || newY > height) continue;
        
        let tooClose = false;
        for (let n of nodes) {
          if (Math.hypot(n.baseX - newX, n.baseY - newY) < 40) { tooClose = true; break; }
        }
        if (tooClose) continue;
        
        const childNode = new Node(newX, newY);
        nodes.push(childNode);
        const newEdge = new Edge(parent, childNode);
        edges.push(newEdge);
        
        parent.edges.push(newEdge);
        childNode.edges.push(newEdge);
      }
    }

    // ==========================================
    // THE MASTER LOOP
    // ==========================================
    let lastTime = 0;

    function renderSequence(timestamp) {
      if (!startTime) {
        startTime = timestamp;
        lastTime = timestamp;
        initNetwork();
        setupText();
      }
      
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      const elapsed = (timestamp - startTime) / 1000;

      // Clear transparency to show Ambient CSS leak background
      ctx.clearRect(0, 0, width, height);

      // Noise grain jitter (Dynamic Film Grain) - Every ~3 frames
      if (Math.floor(timestamp / 50) % 2 === 0) {
        const jx = -(Math.random() * 50).toFixed(1);
        const jy = -(Math.random() * 50).toFixed(1);
        noiseCanvas.style.transform = `translate(${jx}px, ${jy}px)`;
      }

      // --- STAGE 1: First Pulse (0 -> 0.6s) ---
      if (elapsed > 0.05 && elapsed < 0.6) {
        if (!state.stage1PulseFired) {
          nodes[0].triggerPulse(12, 1.5);
          state.stage1PulseFired = true; 
        }
      } 
      if (elapsed >= 0.6 && !state.stage1Done) {
        state.stage1Done = true;
      }

      // --- STAGE 2: Network Spreads (0.6 -> 3.2s) ---
      if (elapsed >= 0.6 && elapsed < 3.2) {
        let spawns = 4; 
        while(spawns-- > 0) spawnEdges();
      }

      // Network Objects Updates
      edges.forEach(e => {
        const wasIncomplete = !e.isComplete;
        e.update(dt);
        if (wasIncomplete && e.isComplete && elapsed < 3.2) {
          e.to.triggerPulse(12, 2.0);
        }
        e.draw(ctx, globalNetworkOpacity);
      });

      nodes.forEach(n => {
        n.update(dt, elapsed);
        n.draw(ctx, globalNetworkOpacity);
      });
      
      particles.forEach(p => { p.update(dt, elapsed); p.draw(ctx); });

      // --- STAGE 3: Network Sync Flash (3.2s -> 3.6s) ---
      if (elapsed >= 3.2) {
        if (!state.stage3Done) {
          nodes.forEach(n => n.triggerPulse(16, 3.0));
          state.stage3Done = true;
          playSubBass();
        }
        if (elapsed < 3.6) {
          const fadeProgress = (elapsed - 3.2) / 0.4;
          globalNetworkOpacity = 1.0 - (fadeProgress * 0.75);
        } else {
          globalNetworkOpacity = 0.25;
        }
      }

      // --- STAGE 4: Title Materializes (3.6s -> 6.4s) ---
      if (elapsed >= 3.6 && !state.stage4Done) {
        titleSpans.forEach((span, i) => {
          setTimeout(() => { span.classList.add('title-arrive'); }, i * 28);
        });
        setTimeout(() => { underlineEl.style.width = '100%'; }, 2800); // Trigger line draw at end of transition
        state.stage4Done = true;
      }

      // --- STAGE 5: Glitch Burst (6.4s -> 9.4s) ---
      if (elapsed >= 6.4 && elapsed < 9.4) {
        if (!state.stage5Start) {
          titleEl.style.transition = 'none';
          titleSpans.forEach(span => span.style.transition = 'none');
          state.stage5Start = true;
        }

        // Glitch Chars (80ms)
        if (elapsed - lastGlitchCharTime > 0.08) {
          lastGlitchCharTime = elapsed;
          titleSpans.forEach((span, i) => {
            if (!lockedChars.has(i)) {
              span.textContent = glitchBank[Math.floor(Math.random() * glitchBank.length)];
              span.style.color = COLORS_GLITCH[Math.floor(Math.random() * COLORS_GLITCH.length)];
            }
          });
        }

        // Horizontal + Vertical Shift Div (150ms)
        if (elapsed - lastGlitchShiftTime > 0.15) {
          lastGlitchShiftTime = elapsed;
          const shiftX = (Math.random() * 14 - 7).toFixed(1);
          const shiftY = (Math.random() * 4 - 2).toFixed(1);
          titleEl.style.transform = `translate(${shiftX}px, ${shiftY}px)`;
        }

        // Distortion Bars (200ms)
        if (elapsed - lastDistortionTime > 0.20) {
          lastDistortionTime = elapsed;
          const barCount = Math.floor(Math.random() * 2) + 2; 
          for (let i=0; i<barCount; i++) {
            if (!distortionContainer) break;
            const bar = document.createElement('div');
            bar.className = 'distortion-bar';
            bar.style.top = (Math.random() * 100) + 'vh';
            bar.style.height = (Math.random() * 2 + 3) + 'px';
            distortionContainer.appendChild(bar);
            setTimeout(() => { if (bar.parentNode) bar.parentNode.removeChild(bar); }, 180);
          }
        }

        // Sub-stage 5a: Partial Lock-In (8.5s -> 9.4s)
        if (elapsed >= 8.5) {
          if (!state.stage5aStart) {
            let lockOrder = titleChars.map((_, i) => i);
            lockOrder.sort((a,b) => (a + Math.random()*3) - (b + Math.random()*3));
            
            let lockIndex = 0;
            if (lockTimer) clearInterval(lockTimer);
            lockTimer = setInterval(() => {
              if (lockIndex < lockOrder.length - 2 && elapsed < 9.4) {
                const idx = lockOrder[lockIndex];
                lockedChars.add(idx);
                titleSpans[idx].textContent = titleChars[idx];
                if (titleChars[idx] === ' ') titleSpans[idx].innerHTML = '&nbsp;';
                titleSpans[idx].style.color = ''; 
                lockIndex++;
              } else {
                clearInterval(lockTimer);
              }
            }, 60);
            
            state.stage5aStart = true;
          }
        }
      }

      // --- Sub-stage 5b: The Snap (9.4s) ---
      if (elapsed >= 9.4 && !state.stage5bSnap) {
        if (lockTimer) clearInterval(lockTimer);
        
        // Restore actual title cleanly
        titleEl.style.opacity = '1';
        
        for (let i = 0; i < titleSpans.length; i++) {
           titleSpans[i].textContent = originalTitle[i];
           if (originalTitle[i] === ' ') titleSpans[i].innerHTML = '&nbsp;';
           titleSpans[i].style.color = '';
           titleSpans[i].style.transform = 'none';
        }
        lockedChars.clear();
        
        titleEl.style.transform = `translate(0px, 0px)`;
        if(distortionContainer) distortionContainer.innerHTML = '';
        
        flashDiv.style.opacity = '0.85';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            flashDiv.style.transition = 'opacity 280ms ease-out';
            flashDiv.style.opacity = '0';
          });
        });

        chromaticOffset = 6.0; // Resetting to original ±6px per the previous glitch effect
        state.stage5bSnap = true;
      }

      // --- STAGE 6: Chromatic Lerp (9.4s -> 10.6s) ---
      if (elapsed >= 9.4 && !state.stage6Done) {
        if (chromaticOffset > 0.05) {
          const chromaProgress = (elapsed - 9.4) / 1.2;
          const easeOut = 1 - Math.pow(1 - chromaProgress, 3);
          chromaticOffset = 2 * (1 - easeOut);
          if (chromaticOffset < 0.05) chromaticOffset = 0; 
          titleEl.style.textShadow = `${chromaticOffset}px 0 red, -${chromaticOffset}px 0 rgba(0,255,255,0.5)`;
        } else {
          titleEl.style.textShadow = 'none';
          state.stage6Done = true;
        }
      }

      // --- STAGE 7: Typewriter (10.6s -> 11.8s+) ---
      if (elapsed >= 10.6 && !state.stage7Done) {
        if (!state.stage7Start) {
          subtitleEl.style.opacity = '1';
          lastTypewriterTime = elapsed;
          cursorObj = document.createElement('span');
          cursorObj.id = 'cursor';
          cursorObj.textContent = '|';
          subtitleEl.appendChild(cursorObj);
          state.stage7Start = true;
        }

        if (subtitleIndex <= originalSubtitle.length) {
          if (elapsed - lastTypewriterTime > 0.038) {
            lastTypewriterTime = elapsed;
            subtitleEl.innerHTML = originalSubtitle.substring(0, subtitleIndex);
            subtitleEl.appendChild(cursorObj);
            subtitleIndex++;
            
            if (subtitleIndex > originalSubtitle.length) {
              setTimeout(() => {
                if (cursorObj) {
                  cursorObj.style.transition = 'opacity 300ms';
                  cursorObj.style.opacity = '0';
                  setTimeout(() => { if (cursorObj.parentNode) cursorObj.parentNode.removeChild(cursorObj); }, 300);
                }
              }, 1500); 
              state.stage7Done = true;
            }
          }
        }
      }

      // --- STAGE 8: Idle (11.8s -> ∞) ---
      if (state.stage7Done && elapsed > 11.8) {
        if (!state.stage8Start) {
          setTimeout(() => { 
            hintTextContainer.style.opacity = '1'; 
            customCursor.style.opacity = '1';
          }, 1000);

          function commenceRedirect() {
             if (state.redirecting) return;
             state.redirecting = true;
             document.body.style.transition = 'opacity 800ms ease';
             document.body.style.opacity = '0';
             setTimeout(() => { sessionStorage.setItem('animationPlayed', 'true'); window.location.href = 'presentation.html'; }, 800);
          }

          let debounceValid = false;
          setTimeout(() => { debounceValid = true; }, 500); 
          
          window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') commenceRedirect();
          });
          window.addEventListener('click', () => { if (debounceValid) commenceRedirect(); });
          
          // Auto-advance after 4.5 seconds of idle
          setTimeout(commenceRedirect, 4500);

          state.stage8Start = true;
        }

        if (elapsed - lastIdlePulseTime > nextIdlePulseDelay) {
          lastIdlePulseTime = elapsed;
          nextIdlePulseDelay = 1.8 + Math.random() * 0.7; 
          
          const count = Math.floor(Math.random() * 2) + 2;
          for (let i=0; i<count; i++) {
            const rNode = nodes[Math.floor(Math.random() * nodes.length)];
            rNode.triggerPulse(8, 0.8);
          }

          if (Math.random() > 0.5) {
             const completedEdges = edges.filter(e => e.isComplete);
             if (completedEdges.length > 0) {
               const rEdge = completedEdges[Math.floor(Math.random() * completedEdges.length)];
               rEdge.progress = 0; 
               rEdge.isComplete = false;
             }
          }
        }
      }

      if(!state.redirecting) requestAnimationFrame(renderSequence);
    }

    requestAnimationFrame(renderSequence);

  </script>
</body>
