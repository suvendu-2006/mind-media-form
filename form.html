<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mind & Media — Live Assessment</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090b;
      --surface: #111114;
      --surface2: #18181c;
      --border: rgba(255,255,255,0.09);
      --text: #f4f4f5;
      --muted: rgba(255,255,255,0.42);
      --accent: #C084FC;
      --pink: #F472B6;
      --green: #34d399;
      --blue: #60a5fa;
      --amber: #fbbf24;
      --orange: #fb923c;
      --red: #f87171;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); }
 
    .screen { display: none; flex-direction: column; height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .screen.active { display: flex; }
 
    /* ── SPLASH ── */
    #screen-splash { padding: 52px 28px 40px; justify-content: space-between; }
    .splash-top { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .eyebrow { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
    .splash-title { font-size: 2.1rem; font-weight: 800; line-height: 1.15; margin-bottom: 14px; }
    .splash-title em { font-style: normal; color: var(--accent); }
    .splash-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.75; margin-bottom: 32px; }
    .field-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .name-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 18px 20px; color: var(--text); font-family: 'Sora', sans-serif; font-size: 1rem;
      font-weight: 500; outline: none; -webkit-appearance: none; transition: border-color 0.2s;
    }
    .name-input::placeholder { color: var(--muted); font-weight: 400; }
    .name-input:focus { border-color: var(--accent); }
    .btn { width: 100%; padding: 18px; border: none; border-radius: 16px; font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity 0.2s, transform 0.12s; margin-top: 12px; }
    .btn-accent { background: var(--accent); color: #09090b; }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .btn:not(:disabled):active { transform: scale(0.97); opacity: 0.88; }
    .splash-note { text-align: center; font-size: 0.72rem; color: var(--muted); margin-top: 14px; }
 
    /* ── QUESTION ── */
    #screen-question { flex-direction: column; }
    .q-topbar { padding: 20px 24px 0; flex-shrink: 0; }
    .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .progress-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.35s cubic-bezier(.4,0,.2,1); width: 0%; }
    .progress-count { font-size: 0.72rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .q-body { flex: 1; padding: 16px 24px 28px; display: flex; flex-direction: column; justify-content: space-between; }
    .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 28px 22px 24px; margin-bottom: 16px; }
    .q-num { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .q-text { font-size: 1.12rem; font-weight: 600; line-height: 1.55; }
    @keyframes slideIn { from { opacity:0; transform:translateX(28px); } to { opacity:1; transform:translateX(0); } }
    .q-card.pop { animation: slideIn 0.22s cubic-bezier(.4,0,.2,1) both; }
 
    .likert-wrap { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }
    .likert-opt { position: relative; }
    .likert-opt input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .likert-opt label {
      display: flex; align-items: center; gap: 14px; padding: 15px 18px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.14s, border-color 0.14s; user-select: none;
    }
    .opt-dot { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; flex-shrink: 0; color: var(--muted); transition: all 0.14s; }
    .opt-text { font-size: 0.92rem; font-weight: 500; color: var(--muted); transition: color 0.14s; }
 
    .likert-opt input[value="1"]:checked ~ label { background: rgba(52,211,153,0.10); border-color: rgba(52,211,153,0.4); }
    .likert-opt input[value="1"]:checked ~ label .opt-dot { background: var(--green); border-color: var(--green); color: #09090b; }
    .likert-opt input[value="1"]:checked ~ label .opt-text { color: var(--green); font-weight: 700; }
 
    .likert-opt input[value="2"]:checked ~ label { background: rgba(96,165,250,0.10); border-color: rgba(96,165,250,0.4); }
    .likert-opt input[value="2"]:checked ~ label .opt-dot { background: var(--blue); border-color: var(--blue); color: #09090b; }
    .likert-opt input[value="2"]:checked ~ label .opt-text { color: var(--blue); font-weight: 700; }
 
    .likert-opt input[value="3"]:checked ~ label { background: rgba(251,191,36,0.10); border-color: rgba(251,191,36,0.4); }
    .likert-opt input[value="3"]:checked ~ label .opt-dot { background: var(--amber); border-color: var(--amber); color: #09090b; }
    .likert-opt input[value="3"]:checked ~ label .opt-text { color: var(--amber); font-weight: 700; }
 
    .likert-opt input[value="4"]:checked ~ label { background: rgba(251,146,60,0.10); border-color: rgba(251,146,60,0.4); }
    .likert-opt input[value="4"]:checked ~ label .opt-dot { background: var(--orange); border-color: var(--orange); color: #09090b; }
    .likert-opt input[value="4"]:checked ~ label .opt-text { color: var(--orange); font-weight: 700; }
 
    .likert-opt input[value="5"]:checked ~ label { background: rgba(248,113,113,0.10); border-color: rgba(248,113,113,0.4); }
    .likert-opt input[value="5"]:checked ~ label .opt-dot { background: var(--red); border-color: var(--red); color: #09090b; }
    .likert-opt input[value="5"]:checked ~ label .opt-text { color: var(--red); font-weight: 700; }
 
    .btn-next { width: 100%; padding: 18px; background: var(--accent); color: #09090b; border: none; border-radius: 16px; font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; -webkit-tap-highlight-color: transparent; opacity: 0.28; pointer-events: none; transition: opacity 0.2s, transform 0.12s; }
    .btn-next.on { opacity: 1; pointer-events: all; }
    .btn-next.on:active { transform: scale(0.97); }
 
    /* ── REVIEW ── */
    #screen-review { padding: 40px 24px 36px; justify-content: space-between; }
    .review-title { font-size: 1.55rem; font-weight: 800; margin-bottom: 6px; }
    .review-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .summary-list { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 24px; }
    .summary-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; border-bottom: 1px solid var(--border); }
    .summary-row:last-child { border-bottom: none; }
    .summary-qlabel { font-size: 0.8rem; color: var(--muted); flex: 1; margin-right: 12px; }
    .summary-val { font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 99px; white-space: nowrap; }
    .sv1 { background: rgba(52,211,153,0.12); color: var(--green); }
    .sv2 { background: rgba(96,165,250,0.12); color: var(--blue); }
    .sv3 { background: rgba(251,191,36,0.12); color: var(--amber); }
    .sv4 { background: rgba(251,146,60,0.12); color: var(--orange); }
    .sv5 { background: rgba(248,113,113,0.12); color: var(--red); }
 
    /* ── RESULT ── */
    #screen-result { align-items: center; justify-content: center; text-align: center; padding: 48px 32px; }
    .result-emoji { font-size: 3.5rem; margin-bottom: 28px; width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-left: auto; margin-right: auto; }
    .result-pct { font-size: 4.5rem; font-weight: 800; line-height: 1; margin-bottom: 6px; }
    .result-tier { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 18px; }
    .result-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.75; max-width: 280px; margin: 0 auto; }
  </style>
</head>
<body>
 
  <!-- SCREEN 1: Splash -->
  <div class="screen active" id="screen-splash">
    <div class="splash-top">
      <div class="eyebrow">Mind &amp; Media — Live Assessment</div>
      <h1 class="splash-title">How much does social media <em>affect you?</em></h1>
      <p class="splash-desc">10 statements. Rate yourself 1 (Never) to 5 (Always). Takes under 2 minutes.</p>
      <div class="field-label">Your name</div>
      <input class="name-input" id="userName" type="text" placeholder="Enter your full name" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn btn-accent" id="btnStart" disabled>Start →</button>
      <p class="splash-note">Your answers are submitted anonymously.</p>
    </div>
  </div>
 
  <!-- SCREEN 2: Question -->
  <div class="screen" id="screen-question">
    <div class="q-topbar">
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-count" id="progressCount">1 / 10</span>
      </div>
    </div>
    <div class="q-body">
      <div class="q-card" id="qCard">
        <div class="q-num" id="qNum">Question 1</div>
        <div class="q-text" id="qText"></div>
      </div>
      <div>
        <div class="likert-wrap" id="likertWrap"></div>
        <button class="btn-next" id="btnNext">Next →</button>
      </div>
    </div>
  </div>
 
  <!-- SCREEN 3: Review -->
  <div class="screen" id="screen-review">
    <div>
      <div class="review-title">All done, <span id="firstName"></span>.</div>
      <div class="review-sub">Here's a summary before you submit.</div>
      <div class="summary-list" id="summaryList"></div>
    </div>
    <button class="btn btn-accent" id="btnSubmit">Submit Results →</button>
  </div>
 
  <!-- SCREEN 4: Result -->
  <div class="screen" id="screen-result">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-pct" id="resultPct"></div>
    <div class="result-tier" id="resultTier"></div>
    <p class="result-desc" id="resultDesc"></p>
  </div>
 
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyB0N-F7chJjcaZxEEkSTKWYW6f78Czm-_E",
      authDomain: "chatbot-ac0f5.firebaseapp.com",
      databaseURL: "https://chatbot-ac0f5-default-rtdb.firebaseio.com",
      projectId: "chatbot-ac0f5",
      storageBucket: "chatbot-ac0f5.firebasestorage.app",
      messagingSenderId: "807712096391",
      appId: "1:807712096391:web:2224fa0b060ba9d398f822"
    });
    const db = firebase.database();
 
    const questions = [
      "I check social media within 10 minutes of waking up.",
      "I scroll social media for much longer than I intended.",
      "Using social media at night affects my sleep.",
      "Social media content has made me feel anxious, sad, or angry.",
      "I compare my life to what I see on social media.",
      "I feel anxious or uncomfortable when I haven't checked social media for a while.",
      "I find it hard to focus on studying or work without checking social media.",
      "I care about how many likes or reactions my posts get.",
      "Social media has caused a misunderstanding or conflict in my real life.",
      "Social media affects me more than I would like to admit."
    ];
 
    const shortLabels = ["Morning check","Unintended scrolling","Sleep disruption","Emotional impact","Social comparison","Withdrawal anxiety","Focus difficulty","Validation seeking","Real-life conflict","Self-awareness"];
    const scaleLabels = {1:"Never",2:"Rarely",3:"Sometimes",4:"Often",5:"Always"};
 
    let userName = '', currentQ = 0;
    const answers = new Array(10).fill(null);
 
    const goScreen = id => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); };
 
    // SPLASH
    const nameInput = document.getElementById('userName');
    const btnStart = document.getElementById('btnStart');
    nameInput.addEventListener('input', () => { btnStart.disabled = nameInput.value.trim().length < 2; });
    btnStart.addEventListener('click', () => {
      userName = nameInput.value.trim();
      document.getElementById('firstName').textContent = userName.split(' ')[0];
      currentQ = 0;
      renderQ();
      goScreen('screen-question');
    });
 
    // QUESTION
    function renderQ() {
      document.getElementById('progressFill').style.width = (currentQ / 10 * 100) + '%';
      document.getElementById('progressCount').textContent = (currentQ + 1) + ' / 10';
      const card = document.getElementById('qCard');
      card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop');
      document.getElementById('qNum').textContent = 'Question ' + (currentQ + 1);
      document.getElementById('qText').textContent = questions[currentQ];
      const wrap = document.getElementById('likertWrap');
      wrap.innerHTML = '';
      const btnNext = document.getElementById('btnNext');
      btnNext.classList.remove('on');
      btnNext.textContent = currentQ === 9 ? 'Review Answers →' : 'Next →';
      for (let v = 1; v <= 5; v++) {
        const div = document.createElement('div'); div.className = 'likert-opt';
        const r = document.createElement('input'); r.type = 'radio'; r.name = 'cq'; r.id = 'o'+v; r.value = v;
        if (answers[currentQ] === v) r.checked = true;
        const lbl = document.createElement('label'); lbl.setAttribute('for','o'+v);
        const dot = document.createElement('div'); dot.className = 'opt-dot'; dot.textContent = v;
        const txt = document.createElement('div'); txt.className = 'opt-text'; txt.textContent = scaleLabels[v];
        lbl.appendChild(dot); lbl.appendChild(txt);
        div.appendChild(r); div.appendChild(lbl); wrap.appendChild(div);
        r.addEventListener('change', () => { answers[currentQ] = v; btnNext.classList.add('on'); });
      }
      if (answers[currentQ] !== null) btnNext.classList.add('on');
    }
 
    document.getElementById('btnNext').addEventListener('click', () => {
      if (answers[currentQ] === null) return;
      if (currentQ < 9) { currentQ++; renderQ(); }
      else { buildSummary(); goScreen('screen-review'); }
    });
 
    // REVIEW
    function buildSummary() {
      const list = document.getElementById('summaryList'); list.innerHTML = '';
      questions.forEach((q, i) => {
        const row = document.createElement('div'); row.className = 'summary-row';
        const ql = document.createElement('span'); ql.className = 'summary-qlabel'; ql.textContent = shortLabels[i];
        const qv = document.createElement('span'); qv.className = 'summary-val sv' + answers[i];
        qv.textContent = answers[i] + ' · ' + scaleLabels[answers[i]];
        row.appendChild(ql); row.appendChild(qv); list.appendChild(row);
      });
    }
 
    // SUBMIT
    document.getElementById('btnSubmit').addEventListener('click', async () => {
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true; btn.textContent = 'Submitting...';
      const total = answers.reduce((a,b) => a+b, 0);
      const score = Math.round((total / 50) * 100);
      let tier, statusColor, glowColor, desc, emoji, emojiBg;
      if (score <= 40) {
        tier='Low Impact'; statusColor='#34d399'; glowColor='rgba(52,211,153,0.4)';
        desc="You have a healthy relationship with social media. Stay mindful.";
        emoji='🌱'; emojiBg='rgba(52,211,153,0.12)';
      } else if (score <= 70) {
        tier='Stress Zone'; statusColor='#fbbf24'; glowColor='rgba(251,191,36,0.4)';
        desc="Social media is creating moderate stress. Small boundaries can make a big difference.";
        emoji='⚡'; emojiBg='rgba(251,191,36,0.12)';
      } else {
        tier='Toxic Zone'; statusColor='#f87171'; glowColor='rgba(248,113,113,0.4)';
        desc="Social media is significantly affecting your mental health. A digital detox might help.";
        emoji='🔴'; emojiBg='rgba(248,113,113,0.12)';
      }
      const payload = { name:userName, score, rawScore:total, tier, statusColor, glowColor, answers, timestamp:Date.now() };
      const withTimeout = (p,ms) => Promise.race([p, new Promise((_,r) => setTimeout(()=>r(new Error('timeout')),ms))]);
      try { await withTimeout(db.ref('presentations/audience/scores').push(payload), 8000); } catch {
        try { const url = 'https://chatbot-ac0f5-default-rtdb.firebaseio.com/presentations/audience/scores.json';
          await withTimeout(fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}),8000); } catch {}
      }
      const re = document.getElementById('resultEmoji');
      re.textContent = '✅'; re.style.background = 'rgba(52,211,153,0.12)';
      const rp = document.getElementById('resultPct');
      rp.textContent = 'Thank You!';
      rp.style.color = '#34d399';
      rp.style.fontSize = '2.8rem';
      const rt = document.getElementById('resultTier');
      rt.textContent = 'Responses Submitted';
      rt.style.color = 'var(--muted)';
      document.getElementById('resultDesc').textContent = 'Your answers have been recorded anonymously. Please look up at the presentation screen.';
      goScreen('screen-result');
    });
  </script>
</body>
</html>
